# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind р select-pane -L
bind о select-pane -D
bind л select-pane -U
bind д select-pane -R

bind TAB select-pane -l

