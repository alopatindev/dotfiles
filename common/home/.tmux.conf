set -g status-interval 1
#set -g status-justify centre # center align window list
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 140
#set -g status-left '#[fg=green]#H #[fg=black]• #[fg=green,bright]#(uname -r | cut -c 1-6)#[default]'
set -g status-left ''
#set -g status-right '#[fg=green,bg=default,bright]#(tmux-mem-cpu-load 1) #[fg=red,dim,bg=default]#(uptime | cut -f 4-5 -d " " | cut -f 1 -d ",") #[fg=white,bg=default]%a%l:%M:%S %p#[default] #[fg=blue]%Y-%m-%d'
set -g status-right ''
#set -g status-right "%a %d %b %Y | %H:%M"

# C-b is not acceptable -- Vim uses it
set-option -g prefix C-a
bind-key C-a last-window

#unbind-key [
bind-key Escape copy-mode

unbind-key Space
unbind-key n
unbind-key p
unbind-key r
unbind-key '{'
unbind-key '}'
unbind-key C-o
unbind-key M-o
unbind-key !
#bind-key C-Space next-layout
bind-key n next
bind-key т next
bind-key C-n next
bind-key C-т next
bind-key p prev
bind-key з prev
bind-key C-p prev
bind-key C-з prev

unbind-key S
bind-key S split-window -v 'source ~/scripts/tmux-cd-to-current-dir.sh ; ${SHELL}'
unbind-key s
bind-key s split-window -h 'source ~/scripts/tmux-cd-to-current-dir.sh ; ${SHELL}'

